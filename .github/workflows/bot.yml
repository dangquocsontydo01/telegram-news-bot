name: Aura Capital Bot

on:
  schedule:
    - cron: '0 1 * * *'    # 08:00 sáng VN
    - cron: '0 7 * * *'    # 14:00 chiều VN
    - cron: '0 13 * * *'   # 20:00 tối VN
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python bot.py

      - name: Save posted.json & keep-alive commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Luôn cập nhật timestamp để repo không bị coi là inactive
          mkdir -p data
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > data/keepalive.txt

          git add data/posted.json data/keepalive.txt || true
          git diff --staged --quiet || git commit -m "bot: keepalive & update posted.json [skip ci]"
          git push || true
